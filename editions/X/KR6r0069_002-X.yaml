body:
  text: 四明沙門曇照註先師初陳寡德次讓名僧後舉同學三辭不免仍求四願一雖好學禪行不稱法年既西夕邁守繩牀撫臆論心假名而已吹噓在彼惡聞過實願勿以禪法見欺二生在邊表長逢離亂身闇庠序口拙暄凉方外虗玄久非其分域間樽節一無可取雖欲自慎終恐樸直忤人願不責其規矩三微欲傳燈以報法恩若身當戒範應重去就去就若重傳燈則闕去就若輕則來嫌誚安身未若通法願許為法勿嫌輕重四三十餘年水石之間因成性今王塗既一佛法再興謬承人汎沐此恩化內竭朽力仰酬外護若丘壑念起願放其飲啄以卒殘生許此四心乃赴優時大王方希淨戒故妙願唯諾邊表者荊州屬江北屬魏地是邊也長逢離亂侯景亂梁魏殺元帝也方外虗玄等者自晉至梁多習莊老文中子云虗玄盛而晉滅非老耽之罪即此意也樽節者禮記云是以君子恭敬樽節退讓以明禮樽趍也節次也乃進退合則也去就若重傳燈則闕者師尊嚴則弟子難近故接物隨機義缺也王塗既一者平陳之後車書皆同也飲者即前云峯飲㵎展平生之願也妙願唯諾者晉王允其所請也請戒文曰弟子基承積善生在皇家庭訓早𧺢教夙漸福履攸臻妙機須悟耻崎嶇於小徑希優游於大乘笑止息於化城誓舟航於彼岸開士萬行戒善為先菩薩十受專持最上喻造宮室必先基址徒架虗終不能成孔老釋門咸資鎔鑄不有軌儀孰將安仰誠復能仁本為和尚文殊冥作闍梨而必藉人師顯傳聖授自近之遠感而遂通波崙罄髓於無竭善財忘身於法界經有明文非從臆說深信佛語幸遵明導禪師佛法龍象戒珠圓淨定水淵澄因靜發慧安無礙辨先物後己謙挹成風名稱遠聞眾所知識弟子所以虔誠遙注命揖遠延每畏緣差值諸留難亦既至止心路豁然及披雲霧即消煩惱以今開皇十一年十一月二十三日於總管金城殿設千僧會敬屈授菩薩戒戒名為孝亦名制止方便智度歸宗奉極以此勝福奉資至尊皇后作大莊嚴同如來慈普諸佛愛等觀四生猶如一子百錄具載戒疏有七百餘字今文略之但三百十三字庭訓者論語陳亢問於伯魚曰子亦有異聞乎對曰未也甞獨立鯉趍而過庭曰學詩乎對曰未也不學詩無以言鯉退而學詩乃至鯉退而學禮此正趍庭之訓也音怡百錄與南山傳並作此貽訓贈也此彛訓法義則正也崎嶇屈曲㒵喻聲聞之學化城小徑三百由旬舟航彼岸五百由旬則登寶所十受者梵網十戒也鎔鑄者以火鎔金以模範像三教法度就學而成器也命揖遠延者大師止息東林寺王在楊州以舡迎也及披雲霧即消煩惱者喻文也披開也雲開也雲開日出煩惱霜壞也奉資至尊皇后者即文帝獨孤氏也猶如一子下百錄更有九十五字略之也師云大王紆遵聖禁名曰總持王曰大師傳佛法燈稱為智者所獲檀嚫各六十種一時迴施悲敬兩田使福德增多以資家國香火事訖晉王紆曲遵奉大乘戒禁止一切惡持一切善故曰總持自受戒後百錄諸書皆稱法名師稱智者故國清寺云王後撿地持經特立此號彼經戒品第十云若在家出家發菩提願恭敬長跪曲身向於智者作是言願大德受我菩薩大律儀戒如是念已默然而住爾時智者作是言善男子汝欲於我受一切菩薩大戒云云檀者施也達嚫那此云淨施字異義一也文云各六十種應改為共字也汎舸衡峽大王靡駕貴州臨江奉送供給隆重轉倍於前既值便風朝發夕還大舡曰舸衡峽二州本去衡州南岳言峽者路次之語衡在荊湖南峽在荊湖北傳前云思師避周室之難意住南岳權止光州人蘇山智者得法之後往建康行道不得扈從思歸南岳其南岳歸寂故當報德享奠以酬法乳故晉王書云敬憶江陵暫欲西上先到衡岳用酬師恩王麾駕至楊州奉送者如南山傳云施六十餘事了王乃固請顗曰先有明約事無兩違即拂而起王不敢重邀合掌尋送至于城門曰國鎮不輕道務致停幸觀佛化弘護在懷王禮望目極衡淚而返智者返百錄有書托王撰南岳師文其事甚明也而渚官道俗延頸候望扶老携幼相趍戒場垂黑載白雲屯講座聽眾五千餘人渚者爾雅云水中可居曰洲大者曰洲小者曰渚荊州曰渚官春秋中已有此號杜預不解徧撿群書未見解者今云聽眾五千餘者不知在何寺院恐是造玉泉十住二寺了施戒此一節文似如大師衡州迴而渚官道俗之流皆悉迎候章安簡略爾施鄉答地荊襄未聞既慧日已明福庭將建於當陽縣玉泉山而立精舍蒙勑賜額號為一音重改為玉泉其地本來荒險神獸虵暴諺云三毒之藪踐者寒心創寺其間決無憂慮答地如佛鹿苑鸚林說法皆報夙恩也荊襄者荊州古南陽郡改為江陵府又為襄陽府今朝為荊門軍當陽縣即屬江陵玉泉寺初為一音當開皇十三年賜額名玉泉乃水色如玉也常聞此寺是故蜀將關王神力所造玉泉寺記略不言之今偶得玉泉之說智者抵渚官登南紀望雲山特建道場觀沮嶂山色堆藍紫雲如蓋此可居乎初卜清溪意其迫隘難安於眾行至金龍池北百有餘步有一大木婆娑偃蓋中虗如庵遂於其下趺坐宴安入大寂定一旦天地晦冥風雨嘷怒有無限妖恠種種殊形異狀攢簇師前將欲為害又有巨蟒長十餘丈張口礪牙意欲食啖復有陰魔列陣砲矢雨下經一七日了無懼色師憫之曰汝所為者生死幻夢貪著眾業不自悲悔猶來惱吾耶言訖俱滅不見一夕雲霧開爽月明如晝有二聖者部從威儀如王者狀長者美髯而豐厚少者褁帽而秀發師遂顧問聖者何來曰予乃蜀前將軍關羽兒子日平以戰功故常鎮是此山號三毒山自古迄今人跡罕到唯龍虵虎豹妖精鬼魅之所窟宅大德聖師何枉神足貧道自天台過欲於此處建立道場少酬生成之德神曰果如是弟子當為造寺化供以延十方清眾何如此去一舍地有山狀如覆舡其土深厚形勢將旺弟子於此建寺願師禪定七日言訖而退師既出定大廈告成楩楠交錯棟宇崢嶸丹䑾鮮明金碧相照迎請師居聚眾演法一日神曰弟子在昔用兵討伐膾肝𧢲肉恣縱貪嗔今日何幸得聞無上菩提出世間法今已洗心滌慮求戒品永芘佛乘乘教化群生師從其請為之秉爐傳授自此齊潔愈更精明已上前文也續僧二十七云釋法行者言多卓異或居山谷時入市每往清溪路由覆舡山頂見泉流茂木乃顧曰十年後當有大福慧人營建伽藍乃智者來儀果成先告今知行師預曉前意乃聖人也決者定也三毒既伏何所憂慮乎是春夏旱百姓咸謂神怒故智者躬至泉源滅此邪見口自呪願手又撝略隨所指處重雲靉靆籠山而來長虹煥爛從泉而起風雨衝溢歌詠滿路當時龍佔其境智者於金龍池側以建玉泉百姓龍怒不雨矣撝略者撝謂指獲略謂法即是持呪也荊州總管上柱國宜陽公王積到山禮拜戰汗不安出而言曰積屢經軍陣臨危更勇未甞怖懼頓如今日隋書列傳第五云王世積闡熙新囶人父雅周朝持節開國儀同三司世積容貌魁岸要帶十圍風神爽拔有傑人之表高祖受禪封宜陽公平陳後進位柱國荊州總管及起遼東之役為行軍元帥至柳城遇疾回拜涼州總管謀反事洩坐誅其年王使奉迎開皇十四年二月二十二日其時文帝徵王入朝故書云弟子今入朝覲行次峽州馳仰之誠與時而積故遣使迎希便進道來月下旬唯遲祇接書在百錄更不盡書開皇十一年王雖受戒意旨未盡智者其時急有南岳荊州之行故忩遽而去王既瞻望故重有迎者也荊人違覲向方遙禮臨岐望絕智者答恩建玉泉十住兩寺竟故別父老意返天台彼處鄉人攀違不得覲奉逕禮清姿望斷行矣既而重履江淮道俗再馳欣戴大王尸波羅蜜先到彼岸智波羅蜜今從稟受既而者荊人望斷之語也智者重反楊州而晉王行次陝故遣使至江都迎也先受戒竟今求請淨名疏故云今從稟受等也請文云弟子多幸謬稟師資無量劫來悉憑開悟色心無作昔年虔受身雖踈漏心護明珠定品禪枝併散歸靜荷國鎮藩為臣為子豈籍四緣能入三昧電光斷結其類實多慧解脫人厥朋不少即日欲伏膺智斷率先名教永汎法流兼用治國未知底滯可開化不師嚴道尊可降意不宿世根淺可發萠不菩薩應機可逗時不書云人生在三事之如一況譚釋典而不從師今之慊言備歷素欵成就事請棄飾辭此請文百錄題目謂王謝天冠仍請淨名義疏略去前九十七字其間語句亦有差者想章安揀治如此也色心無作者如云不起而已起則性無作假色大乘戒體也定品禪枝者四禪八定枝林功德也四緣者一荷國二鎮藩三為臣四為子有此四緣豈能入三昧耶電光斷結者如阿難入電光三昧斷結證四果又如遺教經云譬如夜見電光即得見道是也惠解脫人修三念處成三解脫如常辨人生在三者君臣父子師資諸書具載多矣請棄飾辭者王請大師不須謙退故云棄飾辭也答曰謬承人汎擬迹師資顧此膚踈以非時許況隆高命彌匪克當徒欲沉吟必乖深寄此乃不允所請者也重請云學貴承師事推物論歷求法界措心有在仰惟宿植善根非一生得初乃由學俄逢聖境南岳記莂說法第一無以仰過照禪師來具述斯事于時心喜以域寸誠智者昔入陳朝彼國明試瓦官大集眾論鉾起榮公強口先被折角兩瓊繼軌纔獲交綏忍師讚歎嗟唱希有弟子仰延之始屈登無畏釋難如流親所聞見眾咸瞻仰承前荊楚莫不歸伏非禪不智驗乎金口比聞名僧所說智者融會甚有階差譬若群流歸乎大海此之包舉始得佛意唯願未得令得未度令度樂說不窮法施無盡說法第一者如南岳印證云於說法人中最為第一照禪師乃南岳弟子梁傳前有列名正傳全失惜哉梁朝凡有兩瓊彭城寶瓊住建安院身長七尺五寸背脾龍文三十九齒一日講次外人見寺有白龍現男女奔至寺但見瓊在座講因是號為白瓊建初寶瓊常被萬椿樹皮黑袈裟故號烏瓊此衣後智者得之進與煬帝文在百錄兩瓊少時同學後亦道價相當繼軌者軌則車轍也初與智者論議如世𩰖戰皆接軌而上也才獲交綏者綏乃馬頦下之纓也戰則兩馬相觸以爭勝負今兩瓊才始交綏怯而便走如左傳云交綏而退荊楚者荊州則舊楚國之地非禪不智者更有非智不禪句經雖多出今依觀心論疏解之疏云空無相無作名三解脫亦名三三昧從正見入定發無漏智名大臣定名大王故名三三昧非智不禪也正定生正見發無漏定為大臣正見為大王名三解脫非禪不智也驗乎金口皆佛說也聞眾所說智者以四悉檀融會經論剖折諸家執爭如大海吞流包舉而盡正得佛意也復使柳顧言稽首虔拜云云智者頻辭不免乃著淨名經疏河東柳顧言東海徐陵並才華族胄應奉文義緘封寶藏王躬受持淨名疏大師為晉王撰者二十八卷荊溪略成十卷現世流行並才華族胄者似如同加潤色飾也徐陵陳朝僕射陳破後不入隋朝乃常隨智者故有此言也今王入朝辭歸東嶺楊州在西天台在東故云東嶺吳民越俗掃巷淘溝㳂道令牧旛華交候吳謂三吳越謂東越溝巷穢雜掃去塵埃淘去臭濁㳂道隨所過路令則縣令牧則大守幢旛華蓋祇候迎送直到天台也寺舊所荒廢凡一十二載人蹤久斷竹樹成林還屆半山忽見沙門眉髮皓然秉錫當路眾共咸覩行次漸近逡巡韜秘聖猶尚候況人情乎智者雅好泉石負杖閑游若吟歎曰雖在人間弗忘山野幽深谷愉愉靜夜澄神自照豈不樂哉後時一夜皎月映牀獨坐說法連綿良久如人問難侍者智晞明旦啟曰未審昨夜見何因緣答曰吾初夢大風忽起吹壞寶塔次梵僧謂我云機緣如薪照用如火傍助如風三種備矣化道行華頂之夜許相影響機用將盡傍助亦息故來相告耳智晞傳云童稚不群幼懷物外見老病死達世浮危自省昬沉愍諸論溺極加厭離如為怨害誓出塵勞訪尋勝境伏聞智者抗志天台山安禪佛隴誓訓迷塗為世津導丹誠馳仰遠泛滄波年登二十始獲從願一得奉值遂定師資臨終弟子因即啟咨未審和尚當生何所答云如吾見夢報在兜率宮殿青色居天西北見智者大師左右人皆坐寶座唯一座獨空吾問所以答云灌頂却後六年當來昇此說法春秋七十有二貞觀元年十二月十八日午時終見塔在佛隴問智者入滅云歸安養晞傳何云居兜率耶答唯心淨土何處非安養者耶又見南嶽師共憙禪師令吾說法即自念言餘法名義皆曉自裁唯三觀三智最初面受而便說說竟謂我云他方華整相望甚久緣必應往吾等相送吾拜稱諾此死相現也吾憶小時之夢當終此地所以每欣歸山今奉冥告勢將不久死後安厝西南峯所指之地累石周屍植松覆坎立二白塔使人見者發菩提心植松覆坎者含文嘉曰天子墳高三仞樹以松諸侯半之樹以栢大夫八尺樹以槐庶人無墳樹以楊柳自漢至今代無定制通植松栢覆坎者覆盖也坎墳穴也松盛則翠蓋其墳也又經少時語弟子云商行寄金醫去留藥吾雖不敏狂子可悲仍口授觀心論隨語疏成不加點潤論在別本其冬十月皇上歸蕃遣行參高孝信入山奉迎皇上歸蕃者即晉王入京朝省已復江都也既楊州總管即以江都為蕃鎮也因散什物用施貧乏標杙山下處擬殿堂又𦘕作寺圖以為式樣誡囑僧眾如此基陛儼我目前棟宇成就在我死後我必不覩汝等見之後若造寺一依此法杙音亦即是用木標捕殿堂基址又𦘕作圖樣乃今國清寺也智者滅後至仁壽元年創寺方成開皇二十年改元仁壽大師滅後三年矣是寺晉王受皇太子故傳云創寺以後即登春坊者太子宮也或稱春宮東宮儲宮等智者云王家所辨是也弟子疑曰此處山㵎險峙有何緣力能得成寺答云此非小緣乃是王家所辨合眾同聞互相推測或言是姓王之王或言是天王之王或言是國王之王喧喧成論竟不能決今事已驗方知先旨乃說帝王之王標寺基已隨信出山即同使臣高孝信出山也行至石城乃云有疾謂智越云大王欲使吾來吾不負言而來也吾知命在此故不須進前也石城是天台西門大佛是當來靈像處所既好宜最後用心衣鉢道具分為兩分一分奉彌勒一分充羯磨語已右脇西向而臥專稱彌陀般若觀音奉請進藥即云藥能遣病留殘年乎病不與身合藥何能遣年不與心合藥何所留智晞往日復何所聞觀心論中復何所道紛紜醫藥擾累於他又請進齋報云非但步影為齋能無緣無觀即真齋也吾生勞毒器死悅休歸世相如是不足多歎即口授遺書并手書四十六字蓮華香爐犀角如意留別大王願芳香不窮永保如意書具別本封竟遺書乃侍人錄示遺旨手書四十六字乃親禮也別有遺旨一本載之索三衣鉢正命淨掃灑唱二部經為最後聞思聽法華竟讚云法門父母惠解由生本迹曠大微妙難測四十餘年蘊之知誰可與唯獨明了餘人所不見輟斤絕絃於今日矣輟斤絕絃出莊子撿之云云聽無量壽竟讚曰四十八願莊嚴淨土華池寶樹易往無人火車相現能改悔者尚復往生況戒惠熏修行道力故實不唐捐梵音聲相實不誑人當唱經時吳州侍官張達等伴五人自見大佛倍大石尊光明滿山直入房內諸僧或得瑞夢或見奇相雖復異處而同是此時唱經竟索香湯漱口說十如四不生十法界三觀四量無心四悉檀四諦十二因緣六波羅蜜一一法門攝一切法皆能通心到清涼池若能於病患境達諸法門者即二十五人百金可寄涅槃經商行寄金喻也言百者語出莊子金一寸一斤百金則百斤也喻百句解脫耳今我最後䇿觀談玄最後善寂吾今當入智朗請云伏願慈留賜釋餘疑不審何位歿此何生誰可宗仰報曰汝等懶種善根問他功德如盲問乳蹶者訪路告實何益由諸𢤱悷故喜怒可讚既不自省倒見譏嫌吾今不久當為此輩破除疑謗觀心論已解今更報汝吾不領眾必淨六根為他損己只是五品位耳汝問何生者吾諸師友侍從觀音皆來迎我問誰可宗仰豈不曾聞波羅提木叉是汝之師吾常說四種三昧是汝明導教汝捨重檐教汝降三毒教汝治四大教汝解業縛教汝破魔軍教汝調禪味教汝折慢幢教汝遠邪濟教汝出無為坑教汝離大悲難唯此大師能作依止我與汝等因法相遇以法為親傳習佛燈是為眷屬若不能者傳習魔燈非吾徒也誡維那曰人命將終聞鐘磬聲增其正念唯長唯久氣盡為期云可身冷方復響磬世間哭泣著服皆不應為言訖加趺唱三寶名如入三昧以大隋開皇十七年歲次丁巳十一月二十四日未時入滅柢今大宋宣和三年辛丑五百二十四年矣春秋六十僧夏四十至于子時頂上猶煖雖復不許哀號門人哽戀心沒憂悔不能自喻日隱舟沉永無憑仰加趺安坐在外十日道俗奔赴燒香散華號繞泣拜過十日已殮入禪龕之內則流汗徧身綿帛掩拭沾濡若浣既而歸佛隴而連雨不休弟子呪願願賜威神纔動泥洹之轝應手雲開風噪松悲泉奔水咽道俗弟子侍從靈儀返遺囑之地龕墳雖掩妙迹常通謹書十條繼于狀末其一勑昔在蕃寅覽別書感對潛塞向淨名疏而呪願曰昔親奉師顏未敢咨決今承遺旨何由可悟若尋文生解願示神通夜仍感夢群僧集閣王自說義釋難如流見智者飛空而至瀉七寶珊瑚於閣內返更飛去王後答遺旨文并功德疏慰山眾文並在別本送經一藏銅鐘二口香旛委積衣物豐華王人降寺歲月相望每至忌辰結齋不絕司馬王弘依圖造寺山寺秀麗方之釋宮創寺已後即登春坊故知皇太子寺基此瑞驗矣王家造寺斯又驗矣三國成一斯又驗矣寺名國清此又驗矣靈瑞慇懃聯翩四驗古今可以為例焉其二朱方天鄉寺沙門惠延彼土名達昔游光宅早泊法潤忽聞遷化感咽彌辰奉慕靈為生何處因寫法華經以斯冥示潛思累旬夢見觀音高七層塔光焰赫奕過經所稱智者身從觀音從西來至延夢裏作禮乃謂延曰疑心遣否延密懷此相口未曾言後見灌頂始知臨終觀音引導事驗懸契欣羨無已其三土人馬紹宗居貧好施刈稻百束以供寺僧執伇疲勞身如有疾心作是念我由施故而感斯患未測幽冥當有報否困極寢臥夢見智者加趺坐一牀燒香如霧安慰紹宗汝家貧好施何疑無福種種勸喻辭繁不載爾夜宗兄及宗妻母三人共夢晨朝各說異口同言香氣盈家經日不歇宗親感歎冥聖不遙其四開皇十八年四月十六日佛隴僧眾方就坐禪現常形進堂按行上座道修良久瞻奉其年十月十八日有海州連水縣人丘彪晝發誓於龕夜見僧排戶彪即起禮拜云勿拜安隱無慮也遶寺一匝彪隨後奉尋出門數步奄然便失當其月十二日有海州沐陽縣人房伯奴衛伯玉於智者舊室而見其形狀事相如在其五開皇十九年十一月六日土人張造年邁脚蹶曳疾登龕拜曰早蒙香火願來世度脫仍聞龕內應聲又聞彈指造再請云若是冥力重賜神異即復如初造泣而拜戀慕忘返其六仁壽元年正月十九日永嘉縣僧法曉生聞勝德歿傳妙瑞悔不早親追恨疾心故來墳所施千匝禮千拜於昏夕間龕戶自開光明流出照諸樹木枝葉炳然合寺奔馳所共瞻禮其七仁壽二年八月十三日沂州臨沂縣人孫抱長午前於龕所奉見信心殷重後限滿被替獨到龕所辭別灑淚向僧說如此其八大業元年二月二十日土人張子達母俞氏年登九十患一脚短凡十八年自悲已老到墳奉別設齋專至即覺短脚返申行步平正宛如少時此嫗悲憙見人即述遙禮天台以為常則其九荊州弟子法偃於江都造智者影像返至江津像身流汗拭已更出道俗瞻禮如平生汗痕尚在其十荊州玉泉寺造石未得鐫刻智者像至而上自然生脈成文曰天地玄用出生或有磨刮其辭彌亮一境觀讀三日方失智者弘法餘年不畜章疏安無礙辯契理符文挺生天智世間所伏有大機感乃為著文奉勑撰淨名經疏至佛道品為二十八卷覺意三昧一卷六妙門一卷法界次第章門三百科始著六十科為三卷小止觀一卷法華三昧行法一卷又常在高座云若說次第禪門一年一徧若著章疏可五十卷若說法華玄義并圓頓止觀半年各一徧若著章疏各三十卷此三法門皆無文疏講授而已大莊嚴寺法慎私記禪門初分得三十卷尚未刪定而法慎終國清寺灌頂私記法華玄初分得十卷止觀初分得十卷方希再聽畢其首尾會智者涅槃鑽仰無所髣髴龍章未盡要妙深識者自尋得其門也學士法憙凡事十七禪師年登耳順方逢智者陳尚書毛憙嘲之曰尊師猶少弟子何老答云所事者德豈在於年又問曰何者為德答云善巧說法即後代富樓那破魔除障即是優婆笈多毛憙自善其辭談之朝野常為口實又常行方等懺雉來索命神王遮曰法憙當往西方次生得道豈儐汝命耶仍於瓦官寺端坐入滅建業咸覩天地共知又有惠因聽法而發定道勢因領悟而觀開淨辯強記有瀉瓶之德於佛隴燒身惠普修懺象王便現法慎學禪微發持力此二三子不幸早亡門人行解兼善堪為後進師者多矣皆內秘珍寶不令人識今略書見聞如上梁晉安王中兵參軍陳鍼即智者之長兄也年在知命張果相之死在晦朔師令行方等懺鍼見天堂牌門此是陳鍼之堂過十五年當生此地遂延十五年壽果後見鍼驚問君服何藥答但修懺耳果云若非道力安能超死耶梁方茂從師習坐忽發身通微能輕舉智者呵云汝帶妻子何須學此宜急去之大中大夫蔣添玫儀同公吳明徹皆稟息法脚氣獲除法雲遠覃例皆如此灌頂多幸謬逢嘉運濫齒輪下十有三年載天履地不測高深以開皇二十一年遇見開府柳顧言賜訪智者俗家桑梓入道緣由皆不能識克心自責微知惺悟仍問遠祖於故老即詢受業於先達瓦官前事或親承音旨天台後瑞隨分憶持然深禪愽惠妙本靈迹皆非淺短能知但戀慕玄風無所宗仰輙編聞見若奉慈顏披尋首軸涕泗俱下謹狀銑法師云大師所造有為功德造寺三十六所大藏經十五藏親手度僧一萬四千餘人造栴檀金銅素盡像八十萬軀傳法弟子三十二人得法自行不可稱數天台智者大師傳論安定梁肅述論曰修釋氏之訓者務三而已曰戒定惠斯道也始於發心成於妙覺經緯於三乘道達於萬行而能事備焉昔法王出世由一道清淨用一音演說機感不同所聞蓋異故五時五味半滿權實偏圓小大之義播於諸部然殊流要其所歸無越一實故經曰雖說種種道其實為佛乘又曰開方便門示真實相喻之以眾流入海標之以不二法門自他兩得同詣秘密此教之所由作也暨鶴林示滅而法綱散神足隱而宗塗異各權所據矛揗更作其中或三昧云生四依出現應緣不等持論亦別故攝論地持成實唯識之類分路並作非有非空之談莫能一貫既而去聖滋遠其風東扇說法者桎梏於文字莫知自解習禪者虗無於性相不可牽復是此者非彼去證者謂證惠解之道流以忘返身口之事蕩而無章於是法門之大統或幾乎息矣既而教不終否至人利見惠聞惠思或躍相繼法雷之震未普故木鐸重授於天台大師大師象身子善現之超悟備帝堯大舜之異表贊龍樹之遺論從南岳之妙解然後用三種止觀成一事因緣括萬法於一心開十乘於八教戒定惠之說空假中之觀坦然明白可舉而行於是教無遺法法無棄人人無廢心心無擇行行有所證證有其宗大師教門所以為盛故其在世也光昭天下為帝王師範其去世也往來上界為慈氏輔佐卷舒於普門示現降德為如來所使階位境智蓋無得而稱焉於戲應迹雖往微言不墜習之猶足以抗折百家昭示三藏又況聞而能思思而能修修而能進進而不已者歟斯人也雖曰未證吾必謂之近矣今之人正信者鮮啟禪關者或以無佛無法何罪何善之化化之中人已下馳騁貪愛之徒出入衣冠之類以為斯言至矣且不逆耳私欲不廢故從其門者若飛蛾之赴明燭破塊之落空谷殊不知坐致焦爛而莫能自出雖欲益之而實大損與夫眾魔外道為害一揆由是觀之此宗之大訓此教之旁濟其於天下為不侔也自智者傳法五世至今湛然大師中興其道為子言之如此故錄之以繫于篇昔吾祖云沒章安尊者痛訣慈誨永懷玄風既聽解行之旨結集添通復恐始終化事之跡將遂湮墜由是咨訪先達慎持見聞始於靈王瑞託胎終於滅後神應條敘纂集仰為是書俾萬世之下展卷一觀若親覩行事其利益之功莫大刻梓昨留本寺嘉定延燎寺灾而文亦俱灰端記濫漬法緣思報恩德首捎己長仍率同故重事鋟板以廣流布廣後之來者以見吾祖行處者觀而興起雖然由是以見吾祖行處則可即是以為吾祖行處未可也觀者思之端平三年六月既望寫延慶教寺觀堂比丘端記稽首敬書葉枝刊當寺經堂比丘正巳助官會壹拾貫文治乎任持比丘可上助官會壹拾貫文觀堂比丘道𧪣回施嚴判院油錢貳拾貫文會端記謹回嚴判院四年油錢陸拾貫文官會并施長資成就具足女弟子陳百三十三娘施官會伍貫文註天台智者大師別傳下終附天台智者大師畵讚魯國公顏真卿撰天台大師俗姓陳其名智顗華容人隋煬皇帝崇明因號為智者誠敬申師初孕育靈異頻綵煙浮空光照隣堯眉舜目熈若春禪慧悲智嚴其身長沙佛前發弘誓定光菩薩示冥契怳如登山臨海際上指伽藍畢身世東謁大蘇求真諦智同靈鷲聽法偈得宿命通辨無礙旋陀羅尼華三昧居常面西化在東八載瓦官闡玄風敷演智度發禪蒙梁陳舊德皆仰宗遂入天台華頂中因見定光符昔夢降魔制敵為法雄胡僧開道精感通又有聖賢垂秘旨時平國清即名寺購得魚梁五百里其中放生講流水後主三禮彤庭裏請為菩薩戒弟子煬皇出鎮臨江涘金城說會求制止香火事訖廼西旋諸宮聽眾踰五千建立精舍名玉泉橫亘萬里皆稟緣煬皇啟請迴法船非禪不智求弘宣遂著淨名精義傳因令徐柳參其玄帝既西朝趍象魏師因東還遂初志半山忽與沙門值俄頃逡巡復韜祕一時月夜如論議初夢塔壞胡僧至又為南嶽說三智自言必當終此地帝十七年歸江都遣使奉迎師北祖山下規畫為寺圖王家所辦事不孤石城天台西門樞正好修觀形勝殊像前羯磨依昔府寄帝如意花香爐第五法師階位絕觀音下迎彰記莂萬行千宗最後說跏趺不動歸寂滅天雲決漭風慘烈草木仾垂水嗚咽十日容顏殊不別遍身流汗彰異節欲歸佛隴西南峯泥濘載塗那可從門人瀝懇祝睟容應手雲開山翠濃于嗟此地瘞僧龍空餘白塔間青松每至忌辰因命重何時道俗不種種歲歲開龕儼容質最後如何忽忘失齋場數僧千䞉一呼名點之又如實受飡行嚫還復溢廼知神靈難譚悉千變萬化難致詰若欲書之無終畢止觀大師名法源親事左溪弘度門二威灌頂誦師言同稟思文龍樹尊寫照隨形珠好存源公瞻禮心益敦俾餘讚述斯討論庶幾億載垂後昆顏真卿所撰天台大師畵讚九十句聲明家流習于歌讚尚矣盛甞披閱群書會得惠心師注本與此讐挍頗正差謬焉其註本則每韻各八句凡十一韻八十八句無荊溪妙樂間生孫廣述祖教補乾坤二句盛竊謂此二句必出於杜撰非顏氏之真手也而其故有六焉蓋此作也特讚大師之德行非諸祖之所與而歷舉諸祖者獨欲敘法源之祖後人未達其意妄謂遺荊溪師一也自法源以次推上至龍樹菩薩而唯荊溪師失次居菩薩上則錯列倒置無所係屬二也荊溪師甞居妙樂寺撰文句疏記後世因名其書今遂誤以妙樂為師號則震旦之書本見其稱三也若以妙樂果為其號則既云荊溪又云妙樂豈非重複乎四也其置辭造語鄙陋粗拙與上下文甚不相類五也每韻八句而最後一韻獨作十句亦甚無謂六也然原其所以杜撰之由蓋荊溪師弘教著疏列之九祖其美譽芳聲遠出法源之右而讚中歷舉諸祖獨不及此則後人有所憾妄作補增殊不知此讚乃法源之所請則其學之統譜顏氏所當述而同門之荊溪莫所與也自此而因仍傳習不辨真偽則不翅貽謬於後世亦當獲罪於前賢矣今命聲明家刪此二句更恊音律因陳其說書于讚後云延寶丁巳四月前天台座主二品親王盛胤謹識
