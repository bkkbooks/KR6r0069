body:
  text: 四明沙門曇照注天台智者大師別傳天台山名也祖師徽號下文委解所言別者對總得名總則南山續傳三十卷列成十科今於總出別四本不同一章安所記二玉泉法論所記三會稽智果所記四終南山龍田寺法琳所記此四人皆大師弟子唯章安所述流行於世餘三絶聞惜哉亡矣所言傳去聲者傳平聲於行業萬世不沒崔豹古今注程價問曰凡傳者何答曰凡傳皆以木為之長一尺五寸書符信於上又以一板封之皆御傳信也今儒釋二教筆編記善惡永為龜鑑不用板木亦是傳通義也問大師出於陳隋南山生於唐代何故得云從總出別答南山續傳雖出於後乃搜索高流共為一部大師行業亦在其中故得成總此本近有吳興合溪廣福寺智諶法師箋注是則存之非則去之今用南山總傳天台百録陳氏南史玉泉行狀并皇朝張相公關王祠記隋書帝紀列傳并詢雲水同人居玉泉曾讀殿壁紀録別傳有所不載者悉皆引而注之俾祖師行業光昭於萬世亡窮之傳也門人灌頂撰謂登門入室習學之士也僧傳云名灌頂字法雲俗姓吳氏常州吳興人也其祖避地東甌因而不返乃為臨海章安人也生方三月母欲名之夜稱三寶頂乃口效音句清辨時攝靜寺慧拯法師聞而嘆曰此子非凡即以非凡字之七歲出家為拯公弟子遂求道天台承習定慧春秋七十有二貞觀六年八月七日終于國清寺至今寺前大街南出東畔有塔見存後漢書注云章安縣名本號日浦光武改為章安故城基址在縣東南世云十住極為灌頂十地極為法雲受度師知其大器必是地住之人故以此而立名立字也大師諱智顗字德安祖師之諱即湘州果願寺法緒所立顗即靜也其師乃從德立也姓陳氏姓者所以繫統百世使不別也氏者所以別子孫之所出陳氏者姓譜云許州頴川姓陳氏標首今據史記陳𣏌世家云周武王伐紂乃復求舜後得媯滿封之於陳以奉舜祀是為陳胡公歷代而下二十五君有國至陳湣公當周敬王四十一年歲在壬戌為楚惠王滅之總計五百三十八年俱姓陳氏今天下姓陳者應是武王封媯音輝滿而受姓疑地名也諸書不記諶公謂後漢陳實之後此亦無據也頴川人也頴川郡秦置因水得名川即水也後漢志有臨頴頴陰頴陽縣大宋謂京西北路元豐三年改頴昌府即許昌郡去東京二百五十里漢獻帝禪位魏武故號許昌意欲許漢業再昌故有是號也高宗茂績盛傳於譜史矣高宗或指陳胡公後至前後漢魏志晉書此四史內凡有十三人並存列傳茂大也績功也余撿齊梁陳隋諸史則無陳起祖宗裔信是章安遠指前代矣譜謂家譜史謂史藉自漢至晉代諸公皆有大功績也暨晉世遷都暨及也晉高祖姓司馬名𡄻字仲達河內溫縣孝敬里人受魏禪建國雒陽至第六主敏帝諱鄴字彥旗即位改元建興至四年為後趙王劉聰用弟劉耀逼陷雒陽天下援兵不至內外斷絶十一月己未帝使侍中宋敞送於耀帝乘羊車肉袒出降徙帝于平陽國廢至第七主元帝名睿字景文遷都建康即今江寧府升州舊稱建鄴避敏帝諱故稱為建康也家隨南出寓居江漢陳氏本居雒陳乃北方也荊州在南故曰南出寓寄也避劉耀之亂故江漢即江河澄湛也即水際也如詩漢廣序云文王之道被乎南國美化行乎江漢之域因止荊州之華容縣荊州屬荊湖北路今號江陵府又改荊門軍華容縣後漢志云古華容侯國即楚靈王國基今有章華臺基存焉九域志云乾德三年以漢華容地置建寧縣今為公安縣今嶽州華容縣是也父起祖學通經傳談吐絶倫而武䇿運籌偏多勇決大師之父未知官品據祖有功德疏可一紙量云造寺功德薦襄陽府君恐曾知襄陽府郡也學通五經諸朝史傳談吐之間出言有章貫絶人倫加復武藝窮通三略六韜運動籌䇿必克勝矣運籌者漢高祖云運籌帷幄之中決勝千里之外吾不如子房此美張良今文用此語而美之矣梁湘東王蕭繹之荊州列為賓客梁則梁國都建康姓蕭氏初祖乃武帝諱衍字叔達湘東郡即荊州王武帝第七子名繹字世誠初帝夢眇目僧執香爐稱託生王宮既而王母在婇女次侍始褰衣幔有風回裙帝感幸之婇女夢月墮胎中遂孕於天鑒七年八月丁巳生眇目者室中異香有紫胞之異武帝奇之年十三封湘東王後至荊州守太清元年纍遷為鎮西將軍都篤荊州刺史列為賓客者起祖既異常倫不敢臣之故分別為賓客此乃湘東府之官也奉教入朝奉湘王教以為信使或慰問暄涼起居時序或告知封邑安否事由故為使入朝武帝也領軍朱見而嘆曰若非經國之才孰為英王之所重乎南史列傳五十二朱字彥和吳郡錢唐人也博學多聞二十一為明山賓客表薦武帝為太學博士兼通事舍人大同八年加侍中太清二年為中領軍舍人如故故有領軍之號今侍中等職皆帶領軍也當時已是起祖入朝故嘆云經論國政之才實宰輔之器孰者誰也英王者即湘王不敢臣下故列為賓客故言重也孝元帝即位大同二年八月侯景反三年三月侯景陷建業知臺城不守三月十五日於荊州即帝位曰六帝也拜使持節散騎常侍益陽縣開國侯使持節者蘇武使凶奴十九年持漢節而回因取此義故名持節也散騎常侍者漢官儀曰秦及前漢置散騎常侍一人散騎騎馬並乘輿車獻可替珥貂蟬備顧問掌侍人常在君王左右也益陽縣者屬郡在衡州開國者為帝開展社稷也侯者候也為天子斥候非常也五等諸侯當第二也封地四百里以為采邑母徐氏溫良恭儉偏勤齋戒夢香煙五彩輕浮若霧縈回在懷欲拂去之聞人語曰宿世因緣寄託王道福德自至何以去之生則目有重瞳如舜之相又夢吞白鼠因覺體重荊州云母氏因覺身心如虗空怪而卜之於日者乃曰白鼠者乃龍之化也至於載誕夜現神光棟宇煥然兼輝鄰室其歲乃梁大同五年也荊州云一日昏黃里人望屋上火發其焰四起舉衆來救及至乃是陳常侍家生子衆人悉驚異也鄰里憶先靈瑞呼為王道兼用後相復名光道故小立二字眼有重瞳父母藏護不欲人知而人自知之矣南山傳云及誕育夜室內洞明信宿之間其光乃止內外胥悅咸陳鼎爼相慶火滅湯冷為事不成忽有二僧來扣門曰善哉鬼德所重必出家矣言訖而隱荊云在襁褓中便自合掌其語雖異其意皆同所言不欲人知者目有重瞳乃舜相也恐為所害故至年七歲喜往伽藍諸僧口授普門品初啓一遍即得而父母遏絶不聽數往荊云方齠齓中僧中知其根器口授蓮經普門品一舉通卷背誦如流衆皆異之遏者止也聽者許也不許頻往伽藍也齠齓即毀齒也男子八歲女子七歲毀齒此乃陰速陽遲也每存理所誦而惆悵未聞惆悵者感恨也羅什譯法華經遺失普門一偈其偈乃隋朝闍那多所譯至有唐南山方參入大部往往悵恨不能盡聞於偈也奄忽自然通餘文句後以經驗無所失矣通餘文句即是偈文或全部爾鄉閭嗟異溫故知新其若此乎鄉者古制二千五百家為鄉也閭謂鄉里之門大師生則有殊幼乃聰俊人皆嗟異溫故等者語出論語溫故而知新可以為師矣然大師之德生而知者年十五至學之年值孝元之敗侯景詐立簡文帝改太清年為大寶元年元帝知簡文制在臣賊不用寧於江陵改元承聖元年至三年十一月國敗為魏所執十二月辛丑魏人戕帝家國殄喪親屬流徙梁之末運國殄王親家喪眷屬流散徙移所存者少嘆榮會之難久痛凋離之易及勢數無常喻若郡花會之於春露衆蕚爭芳遇之以風雨殘紅委地易見凋零可謂時勢衰殘易及也於長沙像前發弘大願誓作沙門荷負正法為己重任長沙即荊南路長沙郡潭州也其郡河中有大砂渚甚長故曰長沙也彼州寺內佛像之前爾朝代改更未知皇朝稱為何寺然大師生於荊州屬荊湖北路今為江陵又改荊門軍況大師在幼程途且遠往往彼有殊勝特往瞻禮矣弘亦揚也誓者制也發揚大願以四弘自制其心沙門此翻勤息勤修善果息諸惡行肩擔曰荷背持曰負也既精誠感通夢彼瑞像飛臨宅庭授金色手從隙入三遍摩頂由是深厭家獄思滅苦本瑞像即長沙佛也隙櫺也深厭家獄者瑜伽論云在家囚縛猶若牢獄出家放曠猶若虗空是故嘆云身為苦本也但二親恩愛不時聽許前云父母遏絶不聽數往者即此意也雖惟將順而寢哺不安惟唯同也唯恭於諾曲禮云父召無諾唯而起聽不敢逆故其順也寢者眠也哺者食也而役心出家所以眠食不安也乃刻檀寫像披藏尋經曉夜禮誦念念相續刻檀雕像也寫像彩畫也對像則頂禮持經則誦習當拜佛時舉身投地恍焉如夢見極高山臨於大海澄渟蓊更相顯映恍者恍惚也如入定像歷歷似夢高山者即大師後歸天台作放生會船出海海口望山秀美昔夢遊海畔正似於此今以荊考之為僧受具後夢今章安説未出家時所夢也南山傳中説住瓦官寺時所夢有異於此也山頂有僧扣手喚上須臾申臂至于山麓接引令登入一伽藍見所造像在彼殿內僧即定光也彼處有扣手石存焉伽藍即修禪寺今云大慈寺夢見者後相前現也見所造像即前謂刻檀寫像也夢中見者乃精誠所感也夢裏悲泣而陳所願願學得三世佛法對千部論師説之無礙西土天親始學小乘不信摩訶衍法造論五百部申述小乘後因兄無著開導既悟大乘之意方援刀欲截舌懺謝無著止之曰昔以舌毀今以舌贊足矣於是復造五百部論贊述大乘時號為千部論師智者願設遇此儔宏才博贍我亦對揚無憚況金陵碩匠如濟忍兩瓊等單輪隻翼者又何足扣大師所蘊耶不唐世間四事恩惠唐則虗也四事即飲食衣服臥具醫藥等也申臂僧舉手指像而復語云汝當居此汝當終此大師江南散衆初歸天台方見定光以敘夢事下文所載甚是分明既從窹已方見己身對佛而伏夢中之淚委地成流悲喜交懷精勤逾至窹覺也如成流者淚之澘然如水之流悲喜者悲世俗不覩喜自身得見也逾者過也至者甚也後遭二親殄喪丁艱茶毒此一節文與荊不同彼以親在求出家此云二親喪而離俗荊云六師欲挈錫遍覽諸方勝槩辭其母母曰子今遠遊父母甘旨依何人耶師運慈心指其茅化為稻指其水化為油今有茅穗村油河存焉余嘗問遊荊州者云昔華容縣今為公安縣有油河里茅穗村俗人呼之問大師之父乃散騎常侍益陽侯何故貧而無食答恐梁國遭亂人逃國破劫掠之後財寶不藏也丁當也艱憂也父母喪則丁憂也茶則苦也茶音塗字即茶也直加切性苦如孝子喪親苦毒也逮于服訖從兄求去逮及也父死斬縗母死齊縗三年孝滿釋服從吉後從兄求去即陳針也乃陳侯之長子也兄曰天已喪我親汝重割我心既孤且離安可忍乎父母喪去曰孤兄弟相別曰離跪而對曰梁荊百萬一朝僕妾梁元帝荊州建國百萬封疆為魏所敗僕從臣妾一朝殄滅矣于時久役江湖之心不能復處碨磊之內詳此二句非大師語乃章安飾辭爾江湖廣大如范蠡泛舟可逃形隱迹碨磊者小山之貌不可以遁形學道豈可在家囚縛欲報恩酬德當謀道為先唐聚何益銘肌刻骨意不可移出家之志如將外皮并其內骨刻作銘決定之心不可移也時王琳據湘從琳求去琳以陳侯故舊又嘉此志節資給法具深助隨喜南史五十四云王琳字子珩會稽山陰人也元帝居番荊州刺史王琳姊妹並入後宮見幸琳由未弱冠得在左右也年十有八投湘州果願寺沙門法緒而出家焉緒授以十戒導以律儀乃攝以北度五戒十戒二百五十戒以律儀一句總攝之也北度者師居北位面南弟子面北作禮故云也詣惠曠律師兼通方等故北面事焉南山續傳第十義解篇云釋惠曠姓曹氏譙國人也十二出家事江陵寶光寺澄法師律行精明值真帝王藏學攝大乘唯識等論後詣大賢山誦法華經無量義經普賢觀經歷涉二旬三部究竟進修方等懺心淨行勤勝相現前見道場廣博妙飾莊嚴而諸經像縱橫紛雜身在高座足躡繩牀口誦法華手正經像是後心神融淨爽利常日逮受具足律藏精通先世萌動而常樂禪悅怏怏江東無足可問大賢山在衡州南北曰縱東西曰橫諶曰經像縱橫者表部亂也口誦法華手正經像者表當以法華之意區判淳雜使歸正轍此説然也先世萌動者萌即萌芽宿世精修善根蘊乎八識今生以善普重如枯荄資於春露萌芽自根再長怏怏者不足之貌而湘江之東有諸法師禪慧不兼故怏怏然以不足扣問故也時有惠思禪師武津人也名高嵩嶺行深伊洛十年常誦七載方等九旬常坐一時圓證希有能有事彰別傳昔在周室預知佛法當禍故背北遊南意期衡嶽以希棲遁權止光州大蘇山南嶽傳左南山續傳十七卷張華博物志云嵩高為中嶽屬預州言名高嵩嶺意以四嶽低也伊洛即洛陽伊水也亦尚書禹貢伊洛瀍潤既入于河是此水也伊洛既深故比南嶽之行也七載方等傳中不説九旬常坐依文殊問般若經止觀委明此不注也周室者後周姓宇文都長安凡六帝第三帝武帝諱雍字禰羅突建德三年五月毀道釋二教經像悉毀罹沙門道士並令還俗凡經七載既大隋受禪方興佛教思師預知此禍故背北遊南也光州即今衡州也先師遙餐風德如飢渴矣風謂道風德謂德行如飢渴者故詩云未見君子惄如調飢其地乃是陳齊邊境兵刃所衝而能輕於生重於法忽夕死貴朝聞涉險而去當是之時北屬周國南乃陳齊三方各據皆有戍守兵刃交橫故云涉險夕死者論語云朝聞道夕死可也初獲頂拜思曰昔日靈山同聽法華宿緣所追今復來矣荊云悟後乃云吾嘗與汝法華會上同聽勸發品還記得否師蒙印語悟如夢覺了見三世如視諸掌六通三明悉皆圓證即示普賢道場為説四安樂行於是昏曉苦到如教研心四安樂行即本經中品身口意并慈悲四也文句廣釋南嶽有一卷文近以皎公自衡帶此本歸人多傳寫研窮也實如師教研窮其心也于時但勇於求法而貧於資供切柏代香柏盡則繼之以栗卷簾進月月沒則燎之以松栗根氣味猶勝別木故續其柏也燎力照反宵明曰燎故毛詩有庭燎篇美周宣王雞未鳴設大燭於庭以侍諸侯之朝今祖師盡夜之設非只雞鳴而已息不虗黈言不妄出黈他斗切出氣也祖師修六妙門繼志數息故息不虗出矣孝經云非先王之法言不敢道又云夫人不言言必有中古儒君子尚然況吾祖深位言豈妄出耶經二七日誦至藥王品諸佛同讚是真精進是名真法供養到此一句身心豁然齊而入定持因靜發或者疑云大師悟入何不在十如是甚深境界頓證而至此品耶此難無窮況七卷文通皆妙法荊溪云文文之下通結妙名句句之中咸具體等但悟入由時也問止觀云誦經誦呪尚喧於靜祖師何故因誦而悟耶答常坐遮誦故有此説法華三昧通於正助念念之中不離三觀即寂而照即照而寂寂照不二妙觀現前因靜發明三昧行成也照了法華若高輝之臨幽谷高輝當午也幽谷山之深壑也儻日未正午照乃未明悟釋迦一化五時終卒開顯深旨出世化意無所不了佛日大明為若此也達諸法相似長風之遊太虗法華云如風行空中自在無障礙將證白師師更開演大張教網法目圓備落景咨詳連環達旦自心所悟及從師受四夜進功功逾百年落景景者影也夕陽日沒時入室咨問詳究大道也連環者喻兩環相綰不可舒開始自日沒終至天曉授辭請益連環四夜領解貫通功夫深厚過逾時匠一百年也或謂只稟三三昧三觀智今謂不然四夜請益連環達旦豈只二種法門耶觀於下文代講大品般若時在於一經之中用咨三三昧三觀智餘於文下卷舒自在故得云也聞一知十何能為喻論語曰子曰賜與回何如子貢曰回也聞一已知十賜也聞一已知二子曰弗如也吾與汝弗知也先儒謂回聞一事已知十事余謂回洞知十分賜但曉二分而已觀慧無礙禪門不壅宿習開發煥若華敫矣觀即是慧即空假中觀穿觀達不觀觀也始自數息終至觀練薰修超越三昧無所壅滯煥者明也此之觀慧自非宿世習熟豈得一生了悟若朝花披啓秀振軒庭豈不美哉思歎之曰非爾弗證非我莫識所入定者法華三昧前方便也所發持者初旋陀羅尼也初旋陀羅尼者文句解云旋假入空也百千萬億旋陀羅尼者旋空出假也法音方便陀羅尼者二為方便得入中道第一義諦今言初者即是五品十信也以登住為真修也即以十信為方便今言前方便者知屬五品至於祖師遷神時而云吾只五品位爾且有所證南嶽即定已至五品況行道日久想證入彌高其最後五品之告未可量也故梁肅云等覺歟妙覺歟不可得而知縱令文字之師千群萬衆尋汝之辨不可窮矣於説法人中最為第一如佛記迦旃延富樓那説法人中最為第一今南嶽記吾祖亦此意也時有惠邈禪師行矯常倫辨迷時聽自謂門人曰我所敷弘真師子吼他之所説是野干鳴邈師無傳不知宗何經論光州聲譽者邪辨如楞嚴第十野干即野狐未見吾祖乃私輕謗心眼未開誰不惑者先師正引經文傍宗擊節研核考問邈則失徵徵舉也擊節即樂府中柏也祖師以經論而攻之科義而節之即他之邪説不遑所據舉止失措也揚簸慧風則粳粃可識世人治其稻米者乘風揚之去其粃殗取其真穀米則以箕簸之去其粳碎取其淨米也粃亦作秕不成稻者乃殗穀也淘汰定水故砂礫易明淘汰者謂洗澄也小石曰砂碎瓦曰礫以祖師禪定之水淘去邈師之砂礫取其吾祖之明珠范文政公謂石中選玉砂裏淘金即此意於是迷途知返問津識濟當時邈師之徒捨邪歸正從祖師者多矣津水也濟渡也咸知學海之汪洋願乘般若之船濟渡矣仍於是夜夢見三層樓閣邈立其下己坐其上三層樓閣表三德之最要祖師深解故立其上邈解邪辨故立其下又有一人攘臂怒目曰何忽邈耶何疑法耶宜當問我先師設難數關賓主往復怒人辭窮理喪結舌亡言攘音讓掉臂無亂之貌亡音無結舌則目瞪口呿無言則聲消辭喪既是邪神豈敵正説因誡之曰除諸法實相餘皆魔事誡已不復見邈及與怒人夕有聞者謂為寱夕者師夢之夜音踏寱音乂乃夢中語也諶師改云諂者非也旦詣思所具陳其相師曰汝觀般若不退品凡幾種行類相貌奘譯其經五百六十二卷中不退品者本羅什法師所譯也九十六道經云人若説法神助怖之汝既晝折慢幢夜驅惡黨邪不干正法應爾也九十六道經藏録無名恐隋世有之亦恐九十六道經中説者多是魔爾思師造金字大品經竟自開玄義命令代講是以智方日月辨類懸河卷舒稱會有理存焉諶云大品經即摩訶般若四十卷什師譯龍樹智度論一百卷解者也方者比也大智開發比之日月照明破暗懸河者瀑布水也四無礙辨如高嵓溜晝夜流瀉無有間絶卷則收歸一性舒則廣演無窮稱彼機緣會合四悉並存至理之謂唯有三三昧及三觀智用以咨審餘悉自裁思師手持如意臨席讚曰可謂法付法臣法王無事者也如意者古人謂之背𭺗癢處𭺗之則可人意今表如意説也法王乃南嶽自稱法臣則智者也傳續法燈破含生暗如世聖王為民父母朝府賢輔宣布王令家國清宴天下無事惠曠律師亦來會坐思謂曰老僧嘗聽賢子法耳答曰禪師所生非曠之子又曰思亦無功法華力耳代講竟思師誡曰吾久羡南衡恨法無所委汝粗得其門甚適我願吾解不謝汝緣當相揖誡囑也羡嘆也委托也粗略也謝下也云粗得者南嶽位在十信大師位居五品下不測上故云粗得據南山傳云思在座聽代講竟語學徒曰此吾之義愧恨其定力少爾解不謝汝者言我之智解不下於汝但以今世因緣推之不分師資高下故用大法化道衆生平揖行於世間如兄弟也今以付囑汝汝可秉法逗緣傳燈化物莫作最後斷種人也今文正同囑纍品力勸菩薩流通法華也秉持也逗誘引也最後者末法之世也若非聖師逗引無緣了種義似於斷也既奉嚴訓不得扈從衡嶽既盡也扈音戶扈從者陪奉也凡隨尊上在路謂之扈從史書從駕在道曰扈從晉王書云陪扈鑾駕是也于時思師尚在大蘇未遑從南嶽故云不得扈從衡嶽乃不獲陪奉師往南嶽也素聞金陵仁義淵藪試往觀之若法弘其地則不辜付囑素者舊也金陵古之揚州李巡曰江南之氣躁徑厥性輕揚故曰揚州即今江寧府也地曰金陵水曰建業山號蔣山城曰石頭金陵漢地理志云古之秣陵秦始皇改為建安孫權改為建業晉武帝平吳復為秣陵敏帝諱業改為建康凡六朝達國之地始孫權次東晉次劉宋次南齊次梁武至陳六朝計四十餘帝總三百餘年如李白詩云四十餘帝三百秋功名事迹隨東流又金華釋保暹懷古詩云石城秋月滿煙水冷蕭蕭戰氣悲千古歌聲鼓六朝蛩鳴宮草暗霜白井梧凋竟日秦淮上思賢莫可招淵藪者水深闊者曰淵陂澤廣者曰藪淵水深可比六代賢臣之智藪澤廣可比六代賢臣之量爾雅載天下十藪故借此喻試則探試也一觀君臣可化二觀緇素允從若可弘演則不負師之付囑仍共法喜等二十七人同至陳都智者入陳時年三十陳都金陵凡五主共三十三年即第三廢帝光太元年在位凶淫至二年十一月太后令廢為臨海郡王後即宣帝改元太建然上德不德又智音者寡老子云上德不德言上德隱耀世實難知未露風猷誰先可鑒故知音者少也有一老僧厥名法濟即何凱之從叔也自矜禪學倚臥問言有人入定聞攝山地動知僧詮練無常此何禪也厥者其也自襟敖慢之貌此乃得未到定初禪氣分未能深入如經心在定故能知世間生滅法相即此義也無修敬之禮身靠倚背而忽祖師卒問之曰也攝山在建康北六七里止觀寺有詮法師此僧無正傳附攝山栖霞寺惠布傳中布學詮師三論時人謂之語曰詮公四友所謂伏虎朗領悟辨文章勇得意布文在續傳第十七卷練無常者文出禪祕要經三卷羅什於逍遙園譯佛為拘絺羅難陀説始説身念處觀白骨不淨等凡三十六觀門其三昧成次第當證四果只於四大地水火風入定觀察故經中卷第十七觀云得此觀時自然生四黑象直至下文云黑象欲此樹樹一根動此樹動時行者自見繩床下地自然震動日日如是地動之時見其七佛與聲聞衆廣為行者説三十七助聖道法如是觀時狂象大吼拔樹令動時見一切地六震動復更普見三千大千世界一切地動經文甚廣須者往撿答曰邊定不深邪乘暗入若取若説定壞無疑方入初禪至未到定若入滅盡定方乃云深詮師所練無常是藏教初心生滅觀智望衍門還成未了濟驚起謝曰老僧身嘗得此定向靈耀則公説之則所不解説已永失此定若取必為楞嚴十種大魔若頻説露定心易散故當壞也則公既不習禪故難知定相也今聞所未聞非直善知法相亦乃懸見他心濟前倚臥輕問次則驚起不安順服之辭其文可見上云知音者寡今決破濟禪以作發起之由也濟以告凱凱告朝野由是聲馳道俗請益成蹊朝則兩班文武野則郡縣官僚道則慕法僧尼俗則受化男女初聞未曉再問方明故曰請益凡請益者須至恭謹禮記請益必起蹊者大路也摩肩問道日日不停故踏於小徑成於大路矣大忍法師梁朝檀德養道開善不交當世時有義集來會蔣山大忍法師僧史無傳附于隋杭州靈隱天竺寺真觀法師傳中略云大忍法師匿影鐘山遊心方等將欲試瞻高士問津於觀因操桴扣寂用呈玄妙忍乃嘆曰龍樹之道方興東矣忍師梁朝剃落隋世圓寂檀德者檀高也居開善寺保養大道不交世俗也義集者古之法會皆相立難用揚大道近世無之雖有折角重席忍無所容與折角者前漢書朱雲字子遊魯人善周易特少府姓五鹿名充宗亦通易元帝欲令講論諸儒無能抗者有薦雲召入攝齊登堂既論連拄五鹿君拄音主刺也言下墮負故諸儒為之曰五鹿嶽嶽朱雲折角嶽嶽角高貌鹿角雖高被朱雲難折也重席者後漢書文學傳云戴憑字次仲正旦群臣朝賀百僚畢會光武令群臣能説經者更相難詰義有不通輒而奪席以益通者憑遂重坐五十餘席故京師為之語曰解義不窮戴侍中言智解無盡矣此顯忍師當世高德縱有朱戴之揵忍之威重則不容與也容與者鷗鳥相狎此語出唐明皇先師觀慧縱橫聽者傾耳衆成彈指合掌皆言聞所未聞忍歎曰此非文疏所出乃是觀機縱辨般若非鈍非利利鈍由緣豐富適時是其利相般若之智隨機所宜利者深説鈍者淺説故曰豐富適時適悅也開解群迷令他悅意此説法利相也池深華大可意得大論云見雨猛知龍粗覩池深知華大也慶餘暉之有幸使老疾而忘疲先達稱詠故頌聲溢道忍師年老如夕陽晚景日將隱山但有殘照餘影而在聽祖師談雖是老年久坐忘疲先達者章安指忍也頌者毛詩云美盛德之形容也溢者滿也道路也祖師之德嘉聲美譽滿於道路矣于時長干惠辨延入定凞長干寺在揚州辨師先住即止觀寺僧詮弟子當時有譽人謂之長干領語辨是也言定凞者筆誤乃是宋凞梁傳第六云僧伽羅哆此云宋濟宋景帝末年至京師元嘉十年卜居鍾阜建立精舍即宋凞寺也用美乎宋凞之平也天宮僧晃請居佛窟天宮寺梁元帝為湘東王時高祖崩故造薦福也晃師無傳往往初住天宮後居佛窟也皆欲捨講習禪緣差永恨面而誓曰今身障隔不遂稟承後世弘通必希汲引今世講解不訓禪那同於他學汲引者百尺寒泉若無綆汲難濟飢渴故願來生餐手定水也僕射徐陵德優名重夢其先門曰禪師是吾宿世宗範汝宜一心事之既奉冥訓資敬盡節參不失時序拜不避泥水若蒙書疏則洗手燒香冠帶三禮屏氣開封對文伏讀句句稱諾若非微妙至德豈使當世文雄屈意如此耶僕射音夜古者掌僕從射御之職後漢百官志出太常府博士祭酒一人六百石食祿本僕射中與改為祭酒至唐開元元年改左右僕射為左右丞相皇朝亦然南史列傳五十二徐陵字孝穆父曰摛字士秀東郯人也母臧氏嘗夢五色雲化為鳳集其肩上已而誕陵年數歲家人携以候沙門寶志摩其頂曰天上石麒麟也光宅寺惠雲法師每嗟陵早就謂之顏回八歲屬文官歷梁陳二國至陳廢帝太建中為尚書左僕射亦未階相位也陳後主即位官至左光祿太夫太子少傳至德元年卒年七十七贈特進言夢先門者則先父徐摛在門而語也想其先世有香火因緣故其影響諶引庾信齋名無理矣儀同沈君理請住瓦官請開法華經題勑一日停朝事群公畢集官品有儀同三司謂儀式同太宰太傅太保為三司也南史列傳五十八云沈君理字仲倫吳興人也美風儀博涉有識鑒尚陳武帝會稽長公主官至望蔡縣侯位尚書左僕射卒贈翊左將軍儀同三司諡曰貞憲瓦官寺者晉元帝朝於江左以監燒官瓦衙為寺事見僧傳妙玄九旬談玄初啓講日儀同君理是國之附馬故奏請臣僚停早晚兩朝事俱入寺聽受焉金紫光祿王固侍中孔煥尚書毛喜僕射周正弘等南史列傳十三云王固字子堅即王彧曾孫陳廢帝即位授侍中金紫光祿大夫終身不茹葷夜則坐禪晝誦佛經嘗聘魏因宴饗祭請停殺一羊羊於固前跪拜又宴昆明池魏人以南人嗜魚遂大設網𮊁固以佛之法遂一鱗不獲太建中卒於太常卿諡曰恭子南史列傳十七云孔煥字休文今從火邊者非好學善屬文太建六年為吏部尚書八年加侍中至德年中卒南史五十八毛喜字伯武滎陽陽武人少好學長草隸陳宣帝即位除給事黃門侍郎後加御史中丞五兵尚書至後主至德元年受永嘉內史貞明元年徵為光祿大夫領軍驍騎將軍在道卒南史二十四周弘正字思行歷梁陳二朝至宣帝太建二年授尚書左僕射七十九卒贈侍中尚書鑒諡曰簡子朱輪動於路玉珮喧於席俱服戒香同餐法味朱輪馬車也玉珮朝袍之飾乃章安美贊之詞小莊嚴惠榮負戈輕誕其日揚眉舞扇扇便墮地隻搆巨難難不稱揵合掌歎曰非禪不智今之法座乎續高僧傳第八惠榮姓顧氏會稽山陰人也梁武帝大通年辭親出聽時建初彭城盛弘成實素未陳略即盡清辨一衆同嗟便開令望二親附書得則焚之顧謂友曰吾豈不懷廢吾業也積功三十年不號義龍誓無返矣至德末年卒于都非禪不智者僧傳坐禪論云禪智相遵念惠攸發遺教經云依因此戒得生諸禪定及滅苦智慧也法歲法師爾日並坐撫榮背而嘲曰從來義龍今成伏鹿扇既墮地以何遮羞榮答曰輕敵失勢猶未可欺也法歲無傳義龍乃榮師平日自稱也故嘲之也學海之中生於頭角異乎波中魚鱉之類如魏志花欽邴原管寧為友俱遊學相善時人號為三友為一龍欽為龍頭原為龍腹寧為龍尾此亦義龍之始也伏鹿者如前五鹿既被朱雲難折其角故氣不升其心雌伏今亦似之矣興皇法朗盛弘龍樹更遣高足搆難纍句磨鏡轉明揩金足色虗往既實而忘反也好勝者懷愧不議而革新斯之謂歟宋明帝造興皇寺續傳七十卷法朗於止觀寺受僧詮法師智度中論故云盛弘龍樹也即伏虎郎廣如傳文來難浮偽為虗往答則有據為實故使立難者得益而忘反來難必欲勝不意墮負心懷愧耻雖愧耻且不敢議而去舊執乃得獲新聞此之説也建初寶瓊相逢讓路曰少欲學禪不值名匠長雖有信阻以講説方秋遇賢年又老矣庶因渴仰纍世提擕建初寺康僧會初來吳王孫權所建也瓊師無傳附干陳大彭城寺寶瓊傳中又下煬帝重請疏兩瓊繼軌此二人也方秋遇賢者方當也人之一身猶如四季春則萬物茂興秋則衆芳凋落人少則六根精明老則四大劣弱雖欲學禪豈可及耶楊子云大寒之後索衣裘何太晚乎白馬警韶定林法歲禪衆智令奉誠法安等皆金陵上匠德居僧首捨指南之位遵北面之禮白馬寺在洛陽摩騰初來建也後晉敏帝造龍光白馬二寺韶居是也韶姓顧氏會稽上虞人德行學業在本傳至德元年十一月十一日卒于寺年七十六歲定林禪衆奉誠三皆寺名三師並無傳文其四方襟袖萬里來者不惜無資之軀以希一句之益伏膺至教餐和妙道唯禪唯惠忘寢忘餐矜袖義通道俗資貴也不惜尊貴之身遠涉道路忘疲受法也先師善於將衆調御得所停瓦官八載講大智論説次第禪門蒙語默之益者略難稱紀雖動靜合道而能露疵藏寶恩被一切莫知我誰將者領也調御者養衆如善牧者也大智度論疏流于海外此間絶聞次第禪門即禪波羅蜜十卷流行能露瑕玼令人聞見內懷至寶肥功德身雖法被群生誰説誰聽誰聞誰得故云莫知我誰昔浮頭玄高雙弘定惠梁傳第十一云釋玄高姓魏氏本名靈育馮翊萬年人也母寇氏初信外道偽秦弘始三年夢見梵僧散華滿室覺便孕胎至四年二八日生家內忽有異香及光照壁迄旦乃息母以兒生異故名靈育背世出家改名玄高十五受度僧為説法受戒後專精禪律聞關右有浮陀跋陀禪師在右羊寺弘法高往師之旬日之中妙通禪法跋陀歎曰善哉佛子乃能解悟如此於是卑顏推遜不受師禮今別傳有浮頭二字諶公謂地名今遍尋諸傳并諸地理志並無此名據梁傳第三譯經科云浮陀跋摩亦云浮陀跋陀此云覺鎧高初就學恐從師得名師名浮陀恐聲律之訛謂之浮頭未可知也高師道價與吾祖等故美之云雙弘定惠厥後沈喪單輪隻翼而已車一輪豈能遠運鳥隻翼不能高飛高師之後兼之者勘也逮南嶽挺振至斯為盛者也挺孤標也振起也南嶽至天台為盛如南山云唯南嶽天台雙弘定惠兼善毗尼此言乃實録矣陳始興王出鎮洞庭公卿餞送皆回車瓦官傾捨山積虔拜殷重因而歎曰吾昨夜夢逢強盜今乃表諸軟賊毛繩截骨則憶曳尾泥間南史列傳五十五云始興王叔陵字子嵩陳宣帝第二子也太建元年封始興王十四年遷都督湘州刺史故出守洞庭洞庭湖名也潭衡湘嶽皆繞於湖此王性極嚴惡餞送者亦祖餞祖祭也路中設食為祭如景淳送范相云祭酒臨長道題詩過遠津文選有祖餞一類詩唐韻云以酒食送人曰餞瓦官寺祖師於寺演法聖師受施尚夢強盜餘人受供應遭劫掠自鏡録菌之報斷可知矣毛繩者大論云利養如賊壞功德本喻如毛繩縛人斷膚截骨又云以龍鬚革為繩繫其身上入水愈急而至截骨曳尾泥間者莊子釣於漢水之上楚王使二大夫見焉曰願以境內纍矣莊子持竿不顧曰吾聞楚有神龜死已三十歲王巾笥藏之廟堂之上此龜者寧其死為庿骨而貴乎寧其而曳尾於塗中大夫已寧曳尾塗中莊子曰往矣吾將曳尾塗中毛繩曳尾之説並喻棄名利養道於山林之間故下文遣衆各隨所安也仍謝遣門人曰吾聞暗射則應於絃無明是暗也唇舌是弓也心慮如絃音聲如箭長夜虗發無所覺知若益一人心絃則應又法門如鏡方圓如像若緣牽心轆轤無盡若緣杜心自然蹇澀昔南嶽輪下及始濟江東法鏡屢明心絃數應初瓦官四十人共坐二十人得法次年百餘人共坐二十人得法次年二百人共坐減十人得法其後徒衆轉多得法轉少妨我自行化道可知群賢各隨所安吾欲從吾志暗射者如漢立射聲校尉未必見形聞聲則射中之亦是暗射矣又吳越春秋慶忌亦能暗射喻取於此轆轤乃汲井之輪水不盡故轆轤無窮若杜絶來緣則輪自安靜喻文可見也蔣山過近非避喧之處聞天台地記稱有仙宮白道猷所見者信矣山賦用比蓬萊孫興公之言得矣天台山近有西蜀樊建撰天台行記僧道寺觀山川地里歷觀往代紀録唯此委曲見行於世梁傳第十一云白道猷正云竺曇猷亦云法猷因師白法祖故是號焉燉煌人也傳文事迹甚廣天台羅漢記具録流行今不委書山賦者晉書云孫綽字興公其先太原人也為永嘉太守意將解印以尚幽寂聞此山神秀可以長往使圖其狀故遙為之賦賦成示友人范榮期期曰此賦擲地必有金聲也賦序云天台山者蓋山嶽神秀也涉海則有方丈蓬萊登陵則有四明天台出文選第六卷須者當往撿之若息茲嶺啄峯飲澗展平生之願也性似幽禽飛遊自在峯岡之木實飲溪澗之寒泉陳宣帝有勑留連徐僕射潛涕請住匪從物議直指東川即陳太建七年秋九月初入天台歷遊山水宣帝第四主諱頊字紹世太建十四年正月崩于宣福殿年五十三今傳云秋九月百録載帝留書四月初一日往往請留坐夏至九月道路清涼方許啓行也輔行指其年祖師三十八歲矣吊遁林之拱木慶曇光之石龕吊慰問也梁傳第四云支遁字道林今傳將名與字合呼也姓關氏陳留人幼有神理聰明秀徹二十五出家學通內外為晉賢所重先居餘塢山後居剡中大和元年四月初四終窆於塢中後高士戴逵行經遁墓乃歎曰德音未遠而拱木已繁拱者如人拱手合抱之木也故有拱木之稱曇光者梁傳十一云帛僧光或云曇光未詳何人少習禪業晉永和年遊于江左投剡之石城山山民云此山中有猛獸之災山神縱暴人迹久絶光了無懼色雇人開剪入數里忽大風雨群虎嘷鳴光於山南見一石室乃止其中安禪合掌以為棲神之處至明旦雨息光乃入村乞食夕復還中乃夢見山神或作虎形或作蛇形競來怖光光不恐又經三日又夢見神自言移往章安寒石山推室以相奉後寂然安穩後於石室造寺名隱巖春秋一百十一歲晉太元末以夜坐卒爾訪高察之山路亦晉代高僧經行之路也漱僧順之雲潭訪僧順賞玩之潭可愛故云漱也上之四處並初入天台經歷之處吊慰拱木對墳起悲慶遇石龕喜昔高者尋訪山路意謂同行探泉漱其齒牙可清肺腑者也數聲卓反度石梁屢降南門荏苒淹流未議卜居石梁即羅漢所居石橋也南門即國清之基也荏苒遲留之貌卜居者龜曰卜蓍曰筮然祖師已出陰陽之數豈在卜哉然欲造招提而未知所在嘗宿於石橋見有三人皂幘絳衣此恐是石橋護法神也幘音責頭巾也絳衣紅衫也有一老僧引之而進曰禪師若欲造寺山下有皇太子寺基捨以仰給因而問曰止如今日草舍尚難當於何時能辨此寺老僧答云今非其時三國成一有大勢力人能起此寺寺若成國即清當呼為國清寺老僧多是賓頭盧慶友之儔引進者往往延入石梁方廣寺中也皇太子乃晉王廣立為皇太子故預彰此號三國者其時北齊高氏都業今相州宇文氏都長安京兆府陳氏都金陵江寧府皆為隋滅故成一統大師滅後煬帝造國清寺也于時三方鼎峙車書未同雖獲冥期悠悠何日且旋塗出谷見佛隴南峯左右映帶最為兼美即徘徊留意三方即齊周陳也三國各據故車不同軌軌書不同文義雖蒙神僧冥期況寺卒爾難成故出石梁之谷相于佛隴南峯古人於此嘗見佛現故名為佛隴也有定光禪師南山傳云先有青州僧定光久居此山積四十年定惠兼習蓋神人也顗未至前二年預告山民曰大善知識當來相就宜種豆造醬編蒲為席更起屋居用以待之愚入一節凡列傳亦失落如國中有補史者亦類此也居山三十載迹晦道明易狎難識有所懸記多皆顯驗其夕乃宿定光之草庵咸聞鐘磬寥亮山谷從微至著起盡成韻問光此聲疏數光舞手長吟曰但聞鳴槌集僧是得住之相憶覩招手相引時不餘人莫解其言仍於光所住之北峯創立伽藍樹植松果引流繞瑎瞻望寺所全如昔夢無毫差招手相引者如前當拜佛時恍焉如夢等又荊云落髮受具行道顯著嘗夢登一高山下文同此唯南山傳中云在瓦官時每思林澤乃夢嵓崖萬里雲白半垂其側滄海無畔顗以夢中所見通告門人咸云此乃會稽天台山也今謂一夢三説時異此難擬議也創立伽藍者百録指陳太建十年五月一日左僕射徐陵啓智顗禪師創立天台宴坐名巖宜號修禪寺也即今大慈寺是祖師親寫經文煬帝賜普賢七寶冠現留寺內寺北別峯呼為華頂登眺不見群山暄涼永異餘處先師捨衆獨往頭陀忽於後夜大風拔木雷震動山虺魅千群一形百狀或頭戴龍虺或口出星火形若黑雲聲如霹靂倐忽轉變不可稱計圖畫所寫降魔變等蓋少小耳可畏之相復過於是而能安心湛然空寂逼迫之境自然散失又作父母師僧之形乍枕乍抱悲哽流涕但深念實相體達本無憂苦之相尋復消滅強軟二緣所不能動魔勢如阿含經如來降魔者同相佛法東漸南宗北祖未嘗曾有降天魔者道逾前哲斷可知矣以頭枕膝以手抱身引起愛情也明星出時神僧現曰制敵勝怨乃可為勇能過斯難無如汝者既安慰已復為説法説法之辭可以意得不可以文載當於語下隨句明了披雲飲泉水日非喻即便問曰大聖是何法門當云何學云何弘宜答此名一實諦學之以般若宣之以大悲從今已後若自行兼人吾皆影響明星即曉星也亦曰太白亦曰長庚此星光長西方屬庚庚即金也亦曰金星乃一夜降魔到曉方散披者開也雲開見日萬境洞明飲泉入腹水清肺腑乃明了至道廓徹禪源也如身之影似谷答聲嘗不相離故云影響也頭陀既竟梵語頭陀此云抖擻旋歸佛隴風煙山水外足忘憂妙惠深禪內充愈樂然佛隴艱阻舟車不至年既失稔僧衆隨緣師共惠綽種苣拾象安貧無戚愈亦樂也亦允和也艱險也阻隔也無江河則舟不通路險阻則車難運稔豐也苣音巨即胡麻也古人山間多食胡麻飯拾象者橡斗即樹子莊子狙公養猿朝三暮四即此物也戚憂也孔子曰君子固窮小人窮斯濫矣祖師飯胡麻食橡斗心安其貧略無憂戚俄而陳宣帝詔云禪師佛法雄傑時匠所宗訓兼道俗國之望也宜割始豐縣調以充衆費蠲兩戶民用給薪水衆因更聚亦不為欣天台縣陳時號始豐也調去聲呼調則戶民輸納之租米也蠲除也徐遣兩戶居民數口之家寅夕給薪取水免官之差役也有陳郡袁子雄奔林百里又新野庾崇斂民三課兩人登山值講淨名遂齋戒連辰專心聽法雄見堂前有山琉璃映徹山陰曲澗琳琅布底跨以虹橋填以寶飾梵僧數十皆手擎香爐從山而出登橋入堂威儀溢目香煙徹鼻雄以告崇崇稱不見並席天乖其在此矣雄因發心改造講堂此事非遠堂今尚在新野縣名本屬荊州晉武帝平吳後置新野郡三課者諸書未見所出或云錢財布帛穀米未可承準庾公斂民三課既是粗稅只合輸官何將捨施恐當時詔旨許之也既非己物却成擾民所以聖不令見也堂者即大慈之講堂也但天台基壓巨海黎民漁捕為業為梁者斷溪為扈者藩海秋水一漲巨細填梁晝夜二潮嗷𠲺滿顱骨成嶽蠅蛆若雷非但水陸可悲亦痛舟人濫殞先師為此而運普悲自捨身衣并諸勸助贖一所永為放生之池台境黃岩臨海寧海明之象國溫之樂瑞並東連大海漁字從水者凡漁父之字皆用此乃於水中取魚也梁者取魚具也者護也以箭用繩鎖之如簾籠之像也海濵漁鹽之地故也顱頭骨也殞死也人持淨戒淨土天宮必可受生殺傷既重必墮泥犂也豈不痛哉于時計詡臨郡請講金光明經濟物無偏寶宜出窟以慈修身見者歡喜以慈修口聞聲發心善誘殷勤導達因果合境漁人改惡從善好生去殺湍潮綿亘三百餘里江溪梁合六十三所同時永捨俱成法池一日所濟巨億萬數何止十千而已哉方舟江上講流水品又散粳糧為財法二施船出海口望芙蓉山聳峭叢起若紅蓮之始開橫石孤垂似萎花之將落師云昔夢遊海畔正似於此百録放生云宣猛將軍臨海內史計尚兒子勳之胄請講金光明經一部前雲騎將軍臨海內史陳思展乃子陳安卿請講法花經尚兒勸諭主嚴續祖羊公賀等共捨梁六十三所今云計詡亦恐因名召字也言何止十千者今此放生過流水長者所救之數云又散粳糧者亦如流水令子借象取家中飲噉之方散池與食合矣云方舟者兩舟相並也昔夢者指在家禮佛時之夢也今船出海口所見方合夢之前兆也沙門惠承郡守錢玄智皆著書嗟詠文繁不載當時道俗風騷者覩希有事篇什讚美者多矣初入天台一住九年傳中但記見定光華頂頭陀講淨名放生等事又初住瓦官八年但記濟忍瓊詔降嘆之事然傳有四本大體此傳甚略惜哉無聞也詡後還都別坐餘事因繫延慰臨當伏法遙想先師願申一救其夜夢群魚巨億不可稱計皆吐沫濡詡明旦降勑特原詡罪計公之罪未見因由延慰即今司理官慰者漢百官志云凡是武官皆有此職原者凡罪考信根原罪不合者皆悉捨之當於午時忽起瑞雲黃紫赤白狀如月暈凝於虗空遙蓋寺頂又黃群飛翾動嘈囋棲集簷宇半日方去師云江魚化為黃來此謝恩耳師遣門人惠拔金陵表聞降陳宣帝勑云嚴禁采捕永為放生之池百録徐陵書末紙云陵和南放生得聞公家極相隨喜事是拔公口具謹不多咨祖師又與鎮將解拔國書云仍以此事表白前陳勑云此江若無烏珍味宜依所請永為福池恐宣帝好啖此物以為珍味故有此言也陳東宮問徐陵曰天台功德誰為製答云願神筆玉著會宣帝崩不復得就勑國子祭酒徐孝兄以樹高今在山覽者墮淚東宮亦曰春宮太子居東宮如春氣始生長養其聖德似木布枝滋蔭民澤也此即陳後主也名叔寶字元秀太建十四年宣帝崩即位改志德元年至四年正月改元貞明在位放逸為隋所滅徐孝克立在國清人見追憶慈化見故墮淚也陳文皇太子永陽王出撫甌越纍信殷勤仍赴禹越躬行方等眷屬同稟淨戒晝餐講説夜習坐禪王名伯智字䇿之陳文帝第八子傳在南史第五十五卷其文甚略乃云博通經史太建中遷尚書左僕射後為特進陳亡入長安在隋為國子司業南山傳云出撫吳興請大師授戒陳隋時台號括州是甌越境或云陳宣帝時出為東州刺史故云出撫甌越也先師謂門人智越云吾欲勸王修福禳禍可乎越對云府僚無舊必稱寒熱師云息世譏嫌亦復為善王後出遊墜馬將絶越乃感悔憂愧若傷先師躬自師衆作觀音懺法整心專志王覺小醒憑機而坐王見一梵僧擎香爐直進問王曰疾勢何如王汗流無答僧乃繞王一匝香氣徘徊右旋即覺搭然痛惱都釋戒慧先染其心靈驗次悅其目不欲生信詎可得乎智越乃智者之高弟也行業習禪著于傳內祖師冥知王將遭禍欲使禳之越王之左右非勤舊之知將疑僧徒有所規求成寒熱之斥因遂其諫免致譏嫌矣其願文云仰惟天台闍梨德侔安遠道邁光猷遐邇傾心振錫雲聚紹像法之將墜以救昏蒙顯慧日之重光用拯澆俗加以遊浪法以貫通禪宛有為之結已離無生之忍現前弟子飄揚業風沈淪愛水雖餐法喜弗袪蒙蔽之心徒仰禪悅終懷散動之盧日輪馳騖羲和之轡不停月鏡回軒常娥之影難駐有離有會歎息奚言愛法敬法潺湲無已願生生世世值天台闍梨恆修供養如智積奉智勝如來若藥王覲雷音正覺安養兜率俱蕩一乘今傳文但一百六十八字百録具載七百四十六字今文略也遊浪者遊謂遊刃如疱丁解牛日無全牛浪謂波浪如大海洪波曠闊無際也有為結使即三界見思也然大師位居五品實云有為之結當如梁肅譽云等覺妙覺不可得而知騖者走也羲和者堯之掌日之臣乃以官命日也轡者馬韁繩也言光陰如箭恨不執住日騎之韁繩也常娥則月宮之主佛教謂月宮天子外籍以月屬陰故曰常娥是華麗之容也影難駐轡不停其意一也潺湲水流之貌喻淚下難禁也智勝者大通智勝也智積者十六王子其第一者名曰智積也藥王覲雷音者文出妙莊嚴王品蕩一乘者百録云或見生安養世界或處兜率天宮俱蕩三乘行俱向一乘道今文撮略未先師雖復懷寶窮岫聲振都邑藏形幽壑德惠昭彰大道深禪蘊乎內心身藏深谷如驪珠荊玉雖藏隱懷中而世已知之昭明彰顯也陳少主顧問群臣釋門誰為名勝徐陵對曰瓦官禪師德邁風霜禪鑑淵海昔遠遊京邑群賢所宗今高步天台法雲東靄永陽王北面親承願陛下詔之還都弘法使道俗咸荷陳主初遣傳宜左右趙君卿再遣主書朱雷三傳遣詔回遣道人法升皆帝自手書悉稱疾不當陳主遂仗三使更勑州敦請南山傳云前後七使並帝手親疏今文三使勑州即永陽王見守甌越永陽王書請亦載百録也永陽王諫曰主上虗己朝廷思敬一言利益四生有賴若高讓深山則慈悲有隔弟子微弱尚賜迂屈不赴臺旨將何自安答曰自省無德出處又幽過則身當豈令枉濫業緣如水隆去窊留志不可滿任之而已過則身當答永陽王惡事自向己之謂也隆高也窳烏爪反低水就低理之然也不可固守任緣而已耳仍出金陵路逢兩使初遣應勑左右黃吉寶次遣主書陳建宗延上東堂四事供養禮遇殷勤立禪衆於靈耀開釋論於太極又講仁王般若百座居左五等在右陳主親筵聽法僧正惠暅僧都惠曠長干惠辨皆奉勑擊揚難似冬氷峩峩共結解猶夏日赫赫能消天子欣然百僚盡敬五等公侯伯子男佛教東來歷代人主聽法僧史具載多矣暅音亘僧史無傳不知氏族僧史略云所言僧正者正政也自正正人克敷正令故云也宋世立沙門都今云僧都是也講竟惠暅擎香爐賀席曰國十餘齋身當四講分文折理謂得其門今日出星收見巧知陋由來諍競不止即座肅穆有餘七夜恬靜千枝華耀皆法王之力也陳主於廣德殿謝云非但佛法仰委亦願云諸不逮暅雖剖答不杜根原故使進辭不能遏止大師智海淵深妙窮玄奧故使講席七夜看尋諍心默塞恬淡愈靜其由春花千枝發艷映日照軒孰不云美委寄也逮及也非但佛法寄托大師國家有所不及者亦冀垂言開示不及故有此祝也陳世所檢僧尼無貫者萬人朝議䇿經不合者休道先師諫曰調達日誦萬言不免地獄槃特誦一行偈獲羅漢果篤論唯道豈關多誦陳主大悅即停搜揀無貫者貫穿也無道所資如野中牛馬也失其綸貫之條流矣調達亦云提婆達多此翻人天心熱乃佛堂弟白飯王長子身長一丈五尺四寸出家發四禪定亦有神通根利日誦萬言槃特根鈍唯誦半偈偈云守口攝意身莫犯如是故證阿羅漢果今云一行恐誤也然居靈耀過為褊隘更求間靜立衆安禪忽夢一人翼從嚴整稱名冠達請住三橋師云冠達梁武法名三橋豈非光宅遂移居之其年四月陳主幸寺捨身大施又講仁王般若敘經才訖陳主於大衆內起禮三拜俯仰殷勤以彰敬重太子已下並託舟航咸宗戒範以崇津導先師虗己亡受能安寵辱故談無驚喜梁武入同泰寺捨身大施朝臣以錢億萬貫奉贖皇帝菩薩僧衆默許陳主因而效之故云捨身大施太子已下諸宮嬪妃諸王子等俱受戒法後主之后沉皇后書請法名號海慧菩薩章安略而不書也戒喻浮囊能渡苦海舟航之喻亦然也津水也道引也苦海難渡憑戒導引也皇太子請戒文云淵和南仰惟化道無方隨機濟物衛護國土汲引人天照燭光耀託迹師友比丘入夢符契之像久彰和尚來儀高座之德斯秉是以翹心十地渴仰四依大小二乘內外兩教尊師重道由來尚矣伏希俯提從其所請世世結緣遂其大願日夜增長今二月五日於崇正殿設千僧法會奉請為菩薩戒師謹遣主書劉璿奉迎云云于時傳香在手而臉下垂淚既字為善萠反言成晚後大隋吞陳方悟前旨南史帝紀後主太子名深今云淵者誤也隋吞陳時方年十五閇閣而坐舍人孔伯魚侍焉戎士扣閣而入深安坐勞之曰戎士在塗不至勞也禎明三年三月己巳日隨父王諸親入長安後不知其終比丘入夢即夢定時也秉字南山傳作此昞字秉持也昞明也宜用下昞字十地菩薩具載法數四依孤山頌云五品十信初十已為二行向以為三等覺妙覺四大師乃初依也受戒法名曰善萠謂萠芽初出未成材幹禎明二年受戒三年國破既策東宮之位材幹不成後以事推正符萠意故云方悟前旨隋文帝名堅受周禪遣晉王楊廣為元帥用賀若弼為副將吞陳矣隋本無走既歸唐國既去後加走矣金陵既敗䇿杖荊湘路次盆城忽夢老僧曰陶侃瑞像敬屈守護於是往憩匡山見永遠圖像驗鴈門法師之靈也俄而潯陽反叛寺宇焚燒獨有茲山金無侵擾護像之功其在此矣後主與百司同發自建鄴之長安隋文帝權分京師人宅以候內外修整遣使迎勞之陳人謳詠忘其亡焉使還奏言自後主已下大小在路五百里纍不絶文帝嘆曰一至於此竹曰䇿木曰杖今通舉之荊湘則荊湖北路二州也盆城亦曰浦蓋枕於浦今江州也老僧則遠法師俗姓賈鴈門人也陶侃者晉書云字士行本南陽人晉平吳徙家盧江之潯陽官至相位侃作廣州刺史有漁人於海濵每夕見神光現疑其靈異因以白侃乃遣吏尋驗俄見金像凌波輒船載之身有銘曰阿王所造文殊師利像侃乃送像于武昌縣寒溪寺供養侃後還荊州欲載像行像先輦正應數人可舉及期遂加壯夫百數人碓然不移後更加牛車牽至船船乃復沒使者懼乃送返本寺惠遠法師造東林寺成執爐向方祈之其像飄然飛垔而至大師欲往荊州遠憑護像也憩暫息也匡山亦曰盧山山形四方故曰匡也周靈王太子曾在此山結廬又曰焉東林乃惠遠法師所立西林乃惠求法師所立二處祠堂皆有圖像矣俄而潯陽反叛者順叛相半曰叛隋雖平陳陳人未服其時江南李稜等聚衆作叛又有朱莫間自稱南徐刺史兵據京口又有晉陵顧世與沉玄懀凡五處大亂並元帥揚素驅兵削平唐武宗毀天下寺院有僧藏此像於山谷中宣宗復教其像隱去不見也秦孝王聞風延屈先師對使而言雖欲相見終恐緣差既而王人催促迫不得止將欲解忽值大風纍旬之間妖賊卒起水陸壅隔遂不成行秦王百録中有二書請住安州方等寺隋文帝五子一房陵王勇二煬帝三秦孝王俊四越王秀五漢王諒妖賊者煬帝紀云江南高智惠等相聚作亂楊素傳説祈江賊帥高智惠自號東楊刺史船艦千艘屯據要害素計平之也至尊昔管淮海萬里廓清慕義崇賢歸身如舍遣使招引束鉢赴期師云我與大王深有因緣順水背風不日而至菩薩律儀即從稟受尚書禹貢云淮海惟楊州至尊者乃天子之號也初受戒時自號晉王此傳後成故有此呼也
